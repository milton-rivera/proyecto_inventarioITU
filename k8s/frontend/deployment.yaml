apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: inventario-itu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx
        image: fuanis-frontend:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
