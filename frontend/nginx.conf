server {
    listen 80;
    server_name localhost;

    # 1. Entregar la vista estática (Frontend)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    # 2. Interceptar peticiones a los .jsp y mandarlas al Backend
    location ~ \.jsp$ {
        # En Docker Compose el host es 'backend'. En K8s será el nombre del Service.
        proxy_pass http://backend:8080;
        
        # Pasar las cabeceras originales del cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}